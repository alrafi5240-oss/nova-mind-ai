<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVA MIND AI | Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        color: #f8fafc;
        background:
          radial-gradient(circle at 16% 18%, rgba(168, 85, 247, 0.16), transparent 24%),
          radial-gradient(circle at 84% 14%, rgba(244, 114, 182, 0.12), transparent 24%),
          radial-gradient(circle at 76% 78%, rgba(59, 130, 246, 0.1), transparent 26%),
          linear-gradient(150deg, #0d1324 0%, #0f172a 32%, #111827 62%, #16213c 100%);
      }

      main {
        width: min(100%, 520px);
        padding: 32px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
        box-shadow: 0 28px 72px rgba(2, 6, 23, 0.42);
        backdrop-filter: blur(28px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 2.8rem);
        line-height: 1;
      }

      p {
        margin: 16px 0 0;
        color: rgba(226, 232, 240, 0.86);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NOVA MIND AI</h1>
      <p>The workspace is currently offline. Reconnect to continue chatting, running agents, and syncing the live project.</p>
    </main>
  </body>
  </html>
