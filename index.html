    <script>
      const CHAT_API_URL = "/chat";
      const VOICE_API_URL = "/voice";
      const STORAGE_KEY = "nova_mind_ai_web_chats_v1";
      const SpeechRecognitionApi =
        window.SpeechRecognition || window.webkitSpeechRecognition || null;

      const historyListEl = document.getElementById("historyList");
      const messagesEl = document.getElementById("messages");
      const statusTextEl = document.getElementById("statusText");
      const inputEl = document.getElementById("messageInput");
      const sendButtonEl = document.getElementById("sendButton");
      const newChatButtonEl = document.getElementById("newChatButton");
      const micButtonEl = document.getElementById("micButton");

      let chats = [];
      let activeChatId = null;
      let isLoading = false;
      let isListening = false;
      let activeAudio = null;
      let activeAudioUrl = null;
      let activeSpeakingMessageId = null;
      let recognition = null;

      function createId(prefix) {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return prefix + "_" + window.crypto.randomUUID();
        }
        return prefix + "_" + Date.now() + "_" + Math.random().toString(16).slice(2);
      }

      function createChat() {
        const now = new Date().toISOString();
        return {
          id: createId("chat"),
          title: "New Chat",
          createdAt: now,
          updatedAt: now,
          messages: [],
        };
      }

      function createMessage(role, content) {
        return {
          id: createId("msg"),
          role,
          content,
          timestamp: new Date().toISOString(),
        };
      }

      function saveChats() {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify({
          chats,
          activeChatId,
        }));
      }

      function loadChats() {
        try {
          const raw = window.localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return;
          }
          const parsed = JSON.parse(raw);
          chats = Array.isArray(parsed.chats) ? parsed.chats : [];
          activeChatId = parsed.activeChatId || null;
        } catch (error) {
          chats = [];
          activeChatId = null;
        }
      }

      function ensureState() {
        loadChats();
        if (!chats.length) {
          const firstChat = createChat();
          chats = [firstChat];
          activeChatId = firstChat.id;
        }

        const activeExists = chats.some(function (chat) {
          return chat.id === activeChatId;
        });
        if (!activeExists) {
          activeChatId = chats[0].id;
        }
      }

      function getActiveChat() {
        return chats.find(function (chat) {
          return chat.id === activeChatId;
        }) || null;
      }

      function getTime(timestamp) {
        return new Date(timestamp).toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function truncate(text, maxLength) {
        return text.length > maxLength ? text.slice(0, maxLength).trim() + "..." : text;
      }

      function setStatus(text) {
        statusTextEl.textContent = text;
      }

      function updateSendState() {
        sendButtonEl.disabled = isLoading || !inputEl.value.trim();
        micButtonEl.disabled = isLoading;
        inputEl.disabled = isLoading;
      }

      function autoResize() {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
      }

      function playUiPing(frequency) {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) {
            return;
          }
          const context = new AudioContextClass();
          const oscillator = context.createOscillator();
          const gain = context.createGain();

          oscillator.type = "sine";
          oscillator.frequency.value = frequency;
          gain.gain.value = 0.015;

          oscillator.connect(gain);
          gain.connect(context.destination);
          oscillator.start();
          oscillator.stop(context.currentTime + 0.08);
        } catch (error) {
          // Ignore sound feedback issues.
        }
      }

      function stopVoicePlayback() {
        if (activeAudio) {
          activeAudio.pause();
          activeAudio.src = "";
          activeAudio = null;
        }

        if (activeAudioUrl) {
          URL.revokeObjectURL(activeAudioUrl);
          activeAudioUrl = null;
        }

        const hadSpeakingMessage = Boolean(activeSpeakingMessageId);
        activeSpeakingMessageId = null;
        renderMessages();

        if (hadSpeakingMessage && !isLoading) {
          setStatus("Ready to chat");
        }
      }

      async function playVoice(message) {
        if (!message || !message.content) {
          return;
        }

        if (activeSpeakingMessageId === message.id) {
          stopVoicePlayback();
          setStatus("Ready to chat");
          return;
        }

        stopVoicePlayback();
        setStatus("Speaking...");

        try {
          const response = await fetch(VOICE_API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ text: message.content }),
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || "Voice request failed");
          }

          const audioBlob = await response.blob();
          activeAudioUrl = URL.createObjectURL(audioBlob);
          activeAudio = new Audio(activeAudioUrl);
          activeSpeakingMessageId = message.id;
          renderMessages();

          activeAudio.onended = function () {
            stopVoicePlayback();
          };

          activeAudio.onerror = function () {
            stopVoicePlayback();
            setStatus("Voice playback failed");
          };

          await activeAudio.play();
        } catch (error) {
          stopVoicePlayback();
          setStatus(error.message || "Voice playback failed");
        }
      }

      function addMessage(role, content) {
        const chat = getActiveChat();
        if (!chat) {
          return null;
        }

        const message = createMessage(role, content);
        chat.messages.push(message);
        chat.updatedAt = message.timestamp;

        if (role === "user" && chat.title === "New Chat") {
          chat.title = truncate(content, 28);
        }

        saveChats();
        return message;
      }

      function renderHistory() {
        historyListEl.innerHTML = "";

        chats
          .slice()
          .sort(function (a, b) {
            return new Date(b.updatedAt) - new Date(a.updatedAt);
          })
          .forEach(function (chat) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "history-item" + (chat.id === activeChatId ? " active" : "");

            const lastMessage = chat.messages.length
              ? chat.messages[chat.messages.length - 1].content
              : "Start a conversation";

            button.innerHTML =
              '<span class="history-title">' +
              chat.title +
              '</span><span class="history-preview">' +
              truncate(lastMessage, 54) +
              "</span>";

            button.addEventListener("click", function () {
              activeChatId = chat.id;
              stopVoicePlayback();
              renderApp();
            });

            historyListEl.appendChild(button);
          });
      }

      function createSpeakerButton(message) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "speaker-btn" + (activeSpeakingMessageId === message.id ? " active" : "");
        button.setAttribute("aria-label", activeSpeakingMessageId === message.id ? "Stop voice" : "Play voice");
        button.innerHTML =
          '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" aria-hidden="true">' +
          '<path d="M5 9V15H9L14 19V5L9 9H5Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"></path>' +
          '<path d="M17 9.5C18.2 10.4 19 11.8 19 13.5C19 15.2 18.2 16.6 17 17.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>' +
          "</svg>";
        button.addEventListener("click", function () {
          playVoice(message);
        });
        return button;
      }

      function renderMessages() {
        const chat = getActiveChat();
        messagesEl.innerHTML = "";

        if (!chat) {
          return;
        }

        if (!chat.messages.length) {
          const welcome = document.createElement("div");
          welcome.className = "message-row ai";
          welcome.innerHTML =
            '<div class="bubble-wrap"><div class="bubble">Hi, I\'m Nova Mind AI. Ask me anything and I\'ll reply in text and voice.</div><div class="meta-row"><span>' +
            getTime(chat.createdAt) +
            "</span></div></div>";
          messagesEl.appendChild(welcome);
          return;
        }

        chat.messages.forEach(function (message) {
          const row = document.createElement("div");
          row.className = "message-row " + message.role;

          const wrap = document.createElement("div");
          wrap.className = "bubble-wrap";

          const bubble = document.createElement("div");
          bubble.className = "bubble";

          if (message.role === "ai" && message.typing) {
            bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
          } else {
            bubble.textContent = message.content;
          }

          const metaRow = document.createElement("div");
          metaRow.className = "meta-row";

          if (message.role === "ai" && !message.typing) {
            metaRow.appendChild(createSpeakerButton(message));
          }

          const time = document.createElement("span");
          time.textContent = getTime(message.timestamp);
          metaRow.appendChild(time);

          wrap.appendChild(bubble);
          wrap.appendChild(metaRow);
          row.appendChild(wrap);
          messagesEl.appendChild(row);
        });
        scrollToLatest();
      }

      function scrollToLatest() {
        messagesEl.scrollTo({
          top: messagesEl.scrollHeight,
          behavior: "smooth",
        });
      }

      function renderApp() {
        renderHistory();
        renderMessages();
        updateSendState();
      }

      function addTypingMessage() {
        const chat = getActiveChat();
        if (!chat) {
          return null;
        }

        const typingMessage = {
          id: createId("typing"),
          role: "ai",
          content: "",
          timestamp: new Date().toISOString(),
